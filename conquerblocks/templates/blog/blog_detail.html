{% extends 'layout_base.html' %}

{% block head_title %}Blog Detail - ConquerBlocks{% endblock %}

{% block page_content %}
<article id="{{ post.pk }}">
    <h1>{{ post.title }}</h1>
    <h3>Autor: {{ post.author }}</h3>
    <p>{{ post.content }}...</p>
    <p>Fecha de publicación: {{ post.created_at }}</p>
    <p><a href="{% url 'blog:blog_list' %}">Volver a blog</a></p>
</article>
{% endblock %}
