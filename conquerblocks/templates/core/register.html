{% extends 'layout_base.html' %}

{% block head_title %}Register - ConquerBlocks{% endblock %}

{% block page_content %}
    <h1>Regístrate</h1>
    {% if form %}
      {% if error_message %}
        <p style="color: red;">
          {{ error_message }}
        </p>
      {% endif %}
      <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Registrarse</button>
      </form>
    {% else %}
      <p>{{ msg }}</p>
    {% endif %}
{% endblock %}
